<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Day | For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #F7E7E8;
            --rose: #E2999C;
            --dusty-gold: #C5A059;
            --cream: #FFFDF9;
            --text-main: #5D4E4E;
        }

        body { background-color: var(--cream); color: var(--text-main); font-family: 'Quicksand', sans-serif; overflow-x: hidden; margin: 0; }
        .cursive { font-family: 'Dancing Script', cursive; }
        .serif { font-family: 'Playfair Display', serif; }

        /* --- ANIMATION STAGE --- */
        #animation-stage {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        /* Area klik yang luas untuk segel */
        .seal-container {
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10001;
        }

        .heart-seal {
            width: 60px;
            height: 60px;
            background: #ff85a2;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px #ff85a2;
            animation: pulse-seal 1.5s infinite;
            pointer-events: none; /* Biar container yang tangkap klik */
        }
        .heart-seal::before, .heart-seal::after {
            content: "";
            width: 60px; height: 60px;
            background: #ff85a2;
            border-radius: 50%;
            position: absolute;
        }
        .heart-seal::before { top: -30px; left: 0; }
        .heart-seal::after { left: 30px; top: 0; }

        @keyframes pulse-seal {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.15); }
        }

        /* Eros - Manusia Utuh (SVG/Image) */
        #eros {
            position: absolute;
            bottom: -300px;
            left: 5%;
            width: 250px;
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10000;
        }

        #target-heart {
            position: absolute;
            top: 30%;
            opacity: 0;
            transform: scale(0);
            transition: all 0.8s ease;
            z-index: 10000;
        }

        #rain-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10002;
        }

        /* --- CONTENT STYLES --- */
        #mainContent { opacity: 0; visibility: hidden; transition: all 1.5s ease; }
        .content-show { opacity: 1 !important; visibility: visible !important; }
        .photo-frame { border: 12px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transform: rotate(-2deg); }
    </style>
</head>
<body>

    <div id="animation-stage">
        <div class="seal-container" id="mainSeal">
            <div class="heart-seal"></div>
        </div>
        
        <img id="eros" src="https://www.pngmart.com/files/13/Cupid-Arrow-PNG-Clipart.png" alt="Eros">

        <div id="target-heart">
            <div class="heart-seal" style="animation:none; background: var(--rose);">
                <span style="transform: rotate(45deg); display: block; color: white; font-family: 'Dancing Script'; font-size: 20px; padding: 10px; text-align: center; width: 60px;">
                    NAMA DIA
                </span>
            </div>
        </div>
        <canvas id="rain-canvas"></canvas>
    </div>

    <div id="mainContent" class="max-w-4xl mx-auto px-6 py-20">
        <header class="text-center py-20">
            <h1 class="serif italic text-2xl text-[var(--rose)] mb-2">To Someone Special,</h1>
            <h2 class="cursive text-6xl md:text-8xl text-[var(--text-main)] mb-6">Happy Birthday</h2>
        </header>

        <section class="mb-32 flex justify-center">
            <div class="photo-frame w-72 h-96 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1519340333755-5072120ef3aa?q=80&w=1000" alt="Person" class="w-full h-full object-cover">
            </div>
        </section>

        <section class="mb-32 bg-white p-12 text-center shadow-sm border-y-4 border-[var(--blush)]">
            <h3 class="serif italic text-3xl mb-8 text-[var(--rose)]">Rangkaian Kata</h3>
            <div class="serif italic text-lg leading-loose text-gray-600">
                "Di antara ribuan bintang yang berpijar,<br>Hanya satu yang membawa ketenangan."
            </div>
        </section>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/Marvel-Hamdan-Alaydrus/Marvel-Hamdan-Alaydrus.github.io/main/The%20Only%20Light%20I%20See.mpeg" type="audio/mpeg">
    </audio>

    <script>
        const mainSeal = document.getElementById('mainSeal');
        const stage = document.getElementById('animation-stage');
        const eros = document.getElementById('eros');
        const target = document.getElementById('target-heart');
        const canvas = document.getElementById('rain-canvas');
        const mainContent = document.getElementById('mainContent');
        const music = document.getElementById('bgMusic');
        const ctx = canvas.getContext('2d');

        // Logic Klik
        mainSeal.addEventListener('click', function() {
            // Sembunyikan tombol segera
            this.style.opacity = '0';
            this.style.pointerEvents = 'none';

            // Putar Musik
            music.play();

            // Eros Muncul
            eros.style.bottom = '10%';
            eros.style.left = '20%';

            setTimeout(() => {
                // Hati Sasaran Muncul (Efek Terkena Panah)
                target.style.opacity = '1';
                target.style.transform = 'scale(2)';
                
                // Mulai Hujan Mawar
                startRain();
            }, 1200);
        });

        function startRain() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const items = [];
            const types = ['❤️', '🌹', '💖', '🌸'];

            for(let i=0; i<80; i++) {
                items.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 20 + 15,
                    speed: Math.random() * 3 + 2,
                    content: types[Math.floor(Math.random() * types.length)]
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                items.forEach(p => {
                    ctx.font = p.size + 'px serif';
                    ctx.fillText(p.content, p.x, p.y);
                    p.y += p.speed;
                    if(p.y > canvas.height) p.y = -30;
                });
                requestAnimationFrame(animate);
            }
            animate();

            // Pindah ke Halaman Utama
            setTimeout(() => {
                stage.style.opacity = '0';
                setTimeout(() => {
                    stage.style.display = 'none';
                    mainContent.classList.add('content-show');
                }, 1000);
            }, 4500);
        }
    </script>
</body>
</html>
