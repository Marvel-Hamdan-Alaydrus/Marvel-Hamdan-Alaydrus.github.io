<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise | Romantic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --blush: #F7E7E8;
            --rose: #E2999C;
            --dusty-gold: #C5A059;
            --cream: #FFFDF9;
            --text-main: #5D4E4E;
        }

        body {
            background-color: var(--cream);
            color: var(--text-main);
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .cursive { font-family: 'Dancing Script', cursive; }
        .serif { font-family: 'Playfair Display', serif; }

        /* --- STAGE 1: ANIMATION GATELKEEPER --- */
        #animation-stage {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        /* Area klik Segel Hati */
        .heart-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            cursor: pointer;
            z-index: 10001;
        }

        .heart-seal {
            width: 50px;
            height: 50px;
            background: #ff85a2;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            box-shadow: 0 0 30px #ff85a2;
            animation: pulse-seal 1.5s infinite;
            border: none;
        }
        .heart-seal::before, .heart-seal::after {
            content: "";
            width: 50px; height: 50px;
            background: #ff85a2;
            border-radius: 50%;
            position: absolute;
        }
        .heart-seal::before { top: -25px; left: 0; }
        .heart-seal::after { left: 25px; top: 0; }

        @keyframes pulse-seal {
            0%, 100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); }
            50% { transform: translate(-50%, -50%) rotate(-45deg) scale(1.2); }
        }

        /* Eros Cupid (SVG Mode - Anti-Gagal) */
        #eros-container {
            position: absolute;
            bottom: -300px; /* Posisi awal di luar layar bawah */
            left: 10%;
            width: 250px;
            z-index: 10000;
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none; /* Disembunyikan di awal */
        }
        
        /* Animasi Eros Muncul */
        .eros-show {
            display: block !important;
            animation: show-eros 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes show-eros {
            to { bottom: 35%; left: 15%; }
        }

        #target-heart {
            position: absolute;
            top: 30%;
            opacity: 0;
            transform: scale(0);
            transition: all 0.7s ease;
            z-index: 10000;
        }
        
        /* Hati Kena Panah */
        .heart-hit {
            opacity: 1 !important;
            transform: scale(2.2) !important;
        }

        #rain-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 10001; }

        /* --- STAGE 2: MAIN CONTENT --- */
        #mainContent {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.5s ease;
            visibility: hidden;
        }
        
        .content-show {
            opacity: 1 !important;
            transform: translateY(0) !important;
            visibility: visible !important;
        }

        .photo-frame {
            border: 12px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transform: rotate(-1.5deg);
        }

        .cert-border {
            border: 2px solid var(--rose);
            padding: 10px;
            position: relative;
            background: white;
        }
        .cert-border::after {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid var(--dusty-gold);
        }

        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

        <div class="heart-wrapper" id="sealTrigger">
            <div class="heart-seal"></div>
        </div>
        
        <div id="eros-container">

            </svg>
        </div>

        <div id="target-heart">
            <div class="heart-seal" style="animation:none; background:#E2999C;">
                <span style="transform: rotate(45deg); display: block; color: white; font-family: 'Dancing Script'; font-size: 14px; text-align: center; margin-top: 10px; width: 50px;">
                    Sayyid
                </span>
            </div>
        </div>
        <canvas id="rain-canvas"></canvas>
    </div>

    <div id="mainContent" class="max-w-4xl mx-auto px-6 py-20">
        <header class="text-center mb-32">
            <h1 class="serif italic text-xl text-[var(--rose)] mb-4 tracking-widest">Especially for you,</h1>
            <h2 class="cursive text-6xl md:text-8xl mb-8 floating">Happy Birthday</h2>
        </header>

        <section class="flex justify-center mb-40">
            <div class="photo-frame w-64 h-80 md:w-80 md:h-[450px] overflow-hidden bg-gray-200">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1000" alt="Person" class="w-full h-full object-cover">
            </div>
        </section>

        <section class="mb-40 text-center">
            <div class="max-w-lg mx-auto border-l border-r border-[var(--blush)] px-8 py-4">
                <h3 class="serif italic text-2xl mb-8 text-[var(--rose)]">Rangkaian Kata</h3>
                <div class="serif italic text-lg leading-loose text-gray-500">
                    "Dalam setiap detak waktu,<br>kamu adalah puisi yang paling indah."
                </div>
            </div>
        </section>

        <section class="mb-40">
            <div class="cert-border max-w-xl mx-auto p-12 text-center shadow-sm">
                <h4 class="cursive text-4xl mb-2 text-[var(--text-main)]">The Most Precious Person</h4>
                <div class="h-[1px] w-20 bg-[var(--rose)] mx-auto mb-8"></div>
                <p class="text-sm italic text-gray-400 mb-10 leading-relaxed">Diberikan sebagai bukti bahwa hatimu murni dan membawa bahagia.</p>
                <p class="serif text-[9px] font-bold uppercase tracking-[0.5em] text-[var(--dusty-gold)]">Verified by Love</p>
            </div>
        </section>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/Marvel-Hamdan-Alaydrus/Marvel-Hamdan-Alaydrus.github.io/main/The%20Only%20Light%20I%20See.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // SCRIPT FUSION: Menyatukan semua variabel dan logika klik
        const sealTrigger = document.getElementById('sealTrigger');
        const stage = document.getElementById('animation-stage');
        const erosBox = document.getElementById('eros-container');
        const target = document.getElementById('target-heart');
        const music = document.getElementById('bgMusic');
        const mainContent = document.getElementById('mainContent');
        const canvas = document.getElementById('rain-canvas');
        const ctx = canvas.getContext('2d');

        // Fungsi Utama Klik (Seal Hati)
        sealTrigger.addEventListener('click', () => {
            // 1. Sembunyikan Segel (Tersenyum untuk bypassing autoplay)
            sealTrigger.style.pointerEvents = 'none';
            sealTrigger.style.opacity = '0';

            // 2. Play Musik (Link GitHub Pages)
            music.play().catch(e => console.log("Audio Error:", e));

            // 3. Eros Muncul dan Bergerak Memanah (CSS Animation)
            erosBox.classList.add('eros-show');
            
            // 4. Panah mengenai Hati Sasaran
            setTimeout(() => {
                target.classList.add('heart-hit'); // Hati membesar (Kena Panah)
                startRain(); // Mulai Hujan Mawar
            }, 1500); // Sinkronisasi dengan timing animasi Eros
        });

        // FUNGSI RAIN SYSTEM (Ringan & Cepat)
        function startRain() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const particles = [];
            const symbols = ['❤️', '🌹', '💖', '🌸'];

            for(let i=0; i<80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 20 + 15,
                    speed: Math.random() * 2 + 3,
                    content: symbols[Math.floor(Math.random() * symbols.length)]
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.font = p.size + 'px serif';
                    ctx.fillText(p.content, p.x, p.y);
                    p.y += p.speed;
                    if(p.y > canvas.height) p.y = -30;
                });
                requestAnimationFrame(animate);
            }
            animate();

            // Selesai Animasi & Transisi ke Main Content
            setTimeout(() => {
                stage.style.opacity = '0';
                setTimeout(() => {
                    stage.style.display = 'none';
                    mainContent.classList.add('content-show'); // Munculkan Konten Utama
                    window.scrollTo(0,0); // Reset scroll ke atas
                }, 1000);
            }, 4000);
        }
    </script>
</body>
</html>
